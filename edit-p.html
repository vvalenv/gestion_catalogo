<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self'; 
               script-src 'self'; 
               style-src 'self' 'unsafe-inline'; 
               img-src 'self' data: https:; 
               font-src 'self' data:;" 
    />
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="public/css/style.css">
    <title>Editar producto</title>
  </head>
<body>
    <section class="section-edit-p">
        <a href="index.html" class="position-absolute start-0 top-0">
          <img src="public/img/back.png" alt="back">
        </a>
        <div class="container-md div-ed">
            <form id="form-edit" enctype="multipart/form-data" class="container-md bg-primary p-3 mb-3 rounded form-ed">
                <div class="row">
                    <div class="col form-floating mb-3 fs-5">
                      <input type="text" class="form-control fs-5" id="title" placeholder="Titulo">
                      <label for="floatingInput">Titulo</label>
                    </div>
                    <div class="col form-floating mb-3 fs-5">
                      <input type="number" class="form-control fs-5" id="price" placeholder="Precio" min="0" step=".01">
                      <label for="floatingInput">Precio</label>
                    </div>
                  </div>
                  <div class="row mb-3">
                    <div class="input-group div-desc fs-5">
                      <span class="input-group-text">Descripcion</span>
                      <textarea class="form-control fs-5" id="desc" aria-label="Descripcion"></textarea>
                    </div>
                  </div>
                  <button class="btn btn-success fs-5" type="submit" id="editP">Guardar</button>
                </form>
        </div>
    </section>
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="public/js/renderer-ed.js"></script>
</body>
